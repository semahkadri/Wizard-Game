<!DOCTYPE html>
<html>
<head><title>Wizard Icon Generator — Green Gold Theme</title></head>
<body style="background: #0A1A10; color: #F5F0E4; font-family: sans-serif; padding: 2rem; text-align: center;">
<h2 style="color: #E2C547;">Wizard App — Icon Generator</h2>
<p style="color: #8C8676;">Click "Download All" then move the files into the <code style="color: #E2C547;">icons/</code> folder to replace the old purple icons.</p>
<div id="buttons" style="display: flex; flex-wrap: wrap; gap: 0.75rem; margin: 2rem 0; justify-content: center;"></div>
<canvas id="canvas" style="border: 2px solid rgba(201,168,50,0.3); border-radius: 24px; margin: 1rem auto; display: block;"></canvas>

<script>
const sizes = [72, 96, 128, 144, 152, 192, 384, 512];
const appleSizes = [120, 152, 167, 180];
const faviconSizes = [16, 32];

function drawIcon(canvas, size) {
    canvas.width = size;
    canvas.height = size;
    const ctx = canvas.getContext('2d');
    const r = size;

    // Background — dark green with radial glow
    const bgGrad = ctx.createRadialGradient(r/2, r*0.4, 0, r/2, r/2, r*0.7);
    bgGrad.addColorStop(0, '#1B4D30');
    bgGrad.addColorStop(0.5, '#0F261A');
    bgGrad.addColorStop(1, '#081610');
    ctx.fillStyle = bgGrad;
    ctx.beginPath();
    ctx.arc(r/2, r/2, r/2, 0, Math.PI * 2);
    ctx.fill();

    // Gold outer ring
    ctx.strokeStyle = '#C9A832';
    ctx.lineWidth = Math.max(2, size * 0.04);
    ctx.beginPath();
    ctx.arc(r/2, r/2, r/2 - ctx.lineWidth/2 - 1, 0, Math.PI * 2);
    ctx.stroke();

    // Inner decorative ring
    ctx.strokeStyle = 'rgba(201, 168, 50, 0.25)';
    ctx.lineWidth = Math.max(1, size * 0.012);
    ctx.beginPath();
    ctx.arc(r/2, r/2, r * 0.38, 0, Math.PI * 2);
    ctx.stroke();

    // "W" letter — gold gradient with shadow
    const fontSize = size * 0.48;
    ctx.font = `900 ${fontSize}px 'Arial Black', 'Impact', Arial, sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';

    // Text shadow
    ctx.shadowColor = 'rgba(0, 0, 0, 0.6)';
    ctx.shadowBlur = size * 0.06;
    ctx.shadowOffsetY = size * 0.025;

    const textGrad = ctx.createLinearGradient(r*0.3, r*0.25, r*0.7, r*0.75);
    textGrad.addColorStop(0, '#FFD700');
    textGrad.addColorStop(0.4, '#E2C547');
    textGrad.addColorStop(1, '#C9A832');
    ctx.fillStyle = textGrad;
    ctx.fillText('W', r/2, r/2 + fontSize * 0.02);

    // Reset shadow
    ctx.shadowColor = 'transparent';
    ctx.shadowBlur = 0;
    ctx.shadowOffsetY = 0;

    // Small spade at bottom
    if (size >= 72) {
        const suitSize = size * 0.09;
        ctx.font = `${suitSize}px serif`;
        ctx.fillStyle = 'rgba(201, 168, 50, 0.4)';
        ctx.fillText('\u2660', r/2, r * 0.87);
    }
}

function downloadIcon(size, prefix) {
    const c = document.createElement('canvas');
    drawIcon(c, size);
    const a = document.createElement('a');
    a.download = `${prefix}${size}x${size}.png`;
    a.href = c.toDataURL('image/png');
    a.click();
}

const container = document.getElementById('buttons');

// Download All button first
const allBtn = document.createElement('button');
allBtn.textContent = 'DOWNLOAD ALL ICONS';
allBtn.style.cssText = 'padding: 0.85rem 2.5rem; background: linear-gradient(135deg, #E2C547, #C9A832); color: #0A1A10; border: none; border-radius: 12px; cursor: pointer; font-weight: 900; font-size: 1rem; width: 100%; box-shadow: 0 4px 20px rgba(201,168,50,0.3);';
allBtn.onclick = () => {
    let delay = 0;
    sizes.forEach(s => { setTimeout(() => downloadIcon(s, 'icon-'), delay); delay += 200; });
    appleSizes.forEach(s => { setTimeout(() => downloadIcon(s, 'apple-touch-icon-'), delay); delay += 200; });
    faviconSizes.forEach(s => { setTimeout(() => downloadIcon(s, 'favicon-'), delay); delay += 200; });
};
container.appendChild(allBtn);

// Individual buttons
const note = document.createElement('p');
note.style.cssText = 'width: 100%; color: #5C5849; font-size: 0.8rem; margin: 0.5rem 0;';
note.textContent = 'Or download individually:';
container.appendChild(note);

sizes.forEach(size => {
    const btn = document.createElement('button');
    btn.textContent = `${size}px`;
    btn.style.cssText = 'padding: 0.4rem 0.8rem; background: rgba(27,107,58,0.3); color: #22D36B; border: 1px solid rgba(27,107,58,0.4); border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 0.8rem;';
    btn.onclick = () => downloadIcon(size, 'icon-');
    container.appendChild(btn);
});

// Preview
drawIcon(document.getElementById('canvas'), 256);
</script>
</body>
</html>
